<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending - Vue3 终极版</title>
    <script src="https://cdn.tailwindcss.com"></script>
 <script src="https://cdn.staticfile.net/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.staticfile.net/vue/3.3.4/vue.global.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { github: { dark: '#1e2327', green: '#2ea44f' } }, boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)' } } }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        [v-cloak] { display: none; }
        .list-move, .list-enter-active, .list-leave-active { transition: all 0.5s cubic-bezier(0.55, 0, 0.1, 1); }
        .list-enter-from, .list-leave-to { opacity: 0; transform: scale(0.95) translateY(20px); }
        .list-leave-active { position: absolute; z-index: -1; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">

    <div id="app" v-cloak>
        <nav class="bg-github-dark shadow-md sticky top-0 z-50">
            <div class="max-w-[1400px] mx-auto px-6 py-3 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-6">
                    <h1 class="text-xl font-extrabold text-white flex items-center tracking-tight">
                        <span class="mr-2 text-2xl">🚀</span> GitHub <span class="text-github-green ml-1">Trending</span>
                    </h1>
                    <ul class="hidden md:flex items-center gap-1">
                        <li v-for="tab in categories" :key="tab">
                            <button @click="currentCategory = tab"
                                :class="['px-3 py-1.5 rounded-md transition-all duration-300', 
                                         currentCategory === tab ? 'bg-white/20 text-white font-bold' : 'text-gray-400 hover:text-white hover:bg-white/10']">
                                {{ tab === 'All' ? 'All Languages' : tab }}
                            </button>
                        </li>
                    </ul>
                </div>
                <div class="relative w-full sm:w-64">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">🔍</span>
                    <input type="text" v-model="searchQuery" placeholder="搜索项目名称或语言..." class="w-full bg-white/10 border border-gray-600 text-white text-sm rounded-full focus:ring-2 focus:ring-github-green focus:border-transparent block pl-9 p-1.5 transition-all outline-none placeholder-gray-400">
                </div>
            </div>
        </nav>

        <main class="max-w-[1400px] mx-auto px-4 md:px-6 py-8">
            <div v-if="isLoading" class="text-center py-12 text-gray-500 animate-pulse">正在同步服务器数据...</div>
            <div v-else-if="hasError" class="text-center py-12 text-red-500 bg-red-50 rounded-xl border border-red-200">数据加载失败，请检查网络或刷新重试。</div>

            <div v-else>
                <section class="grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
                    <div class="lg:col-span-8 bg-white p-6 rounded-2xl shadow-soft border border-gray-200">
                        <h3 class="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2"><span class="text-pink-500">📈</span> Star 增长趋势</h3>
                        <div class="relative h-40 w-full"><canvas id="star-growth-chart"></canvas></div>
                    </div>
                    <div class="lg:col-span-4 bg-white p-6 rounded-2xl shadow-soft border border-gray-200">
                        <h3 class="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2"><span class="text-blue-500">📊</span> 语言分布</h3>
                        <div class="relative h-40 w-full flex justify-center"><canvas id="language-distribution-chart"></canvas></div>
                    </div>
                </section>

                <div v-if="filteredProjects.length === 0" class="text-center py-20 text-gray-400">
                    <span class="text-4xl block mb-2">🤔</span>
                    没有找到与 "{{ searchQuery }}" 相关的项目
                </div>

                <transition-group name="list" tag="section" class="grid grid-cols-1 md:grid-cols-2 gap-6 relative">
                    <div v-for="project in filteredProjects" :key="project.name" class="bg-white p-6 rounded-2xl shadow-soft border border-gray-200 hover:shadow-md transition-shadow group flex flex-col justify-between w-full">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <div class="flex items-center gap-3 overflow-hidden">
                                    <span class="bg-gray-800 text-white w-7 h-7 flex-shrink-0 flex items-center justify-center rounded-lg text-sm font-bold">#{{ project.rank }}</span>
                                    <a :href="'https://github.com/' + project.name" target="_blank" class="text-lg font-bold text-gray-900 group-hover:text-blue-600 truncate">{{ project.name }}</a>
                                </div>
                                <span :class="[project.language.color, 'font-bold text-xs bg-gray-50 px-2 py-1 rounded-md border border-gray-100 flex-shrink-0']">{{ project.language.name }}</span>
                            </div>
                            <p class="text-gray-500 text-sm mb-5 line-clamp-2 h-10">{{ project.description }}</p>
                            
                            <div class="flex gap-4 mb-5 text-sm">
                                <div class="flex flex-col">
                                    <span class="text-gray-400 text-xs font-semibold uppercase mb-0.5">Stars</span>
                                    <span class="font-bold text-gray-800"><span class="text-yellow-400">★</span> {{ formatStars(project.stats.totalStars) }}</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-gray-400 text-xs font-semibold uppercase mb-0.5">Forks</span>
                                    <span class="font-bold text-gray-600">{{ project.stats.forks }}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </transition-group>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const globalData = ref(null);
                const isLoading = ref(true);
                const hasError = ref(false);
                const searchQuery = ref('');
                const currentCategory = ref('All');
                const categories = ['All', 'Python', 'JavaScript', 'C++'];

                const filteredProjects = computed(() => {
                    if (!globalData.value) return [];
                    let list = globalData.value.projects[currentCategory.value] || [];
                    const query = searchQuery.value.trim().toLowerCase();
                    if (query) {
                        list = list.filter(p => 
                            p.name.toLowerCase().includes(query) || 
                            (p.description || '').toLowerCase().includes(query) ||
                            (p.language.name || '').toLowerCase().includes(query)
                        );
                    }
                    return list;
                });
const initCharts = () => {
                    // 1. 检查 Chart.js 是否成功加载
                    if (typeof Chart === 'undefined') {
                        console.error('Chart.js 尚未加载');
                        return;
                    }

                    const data = globalData.value;
                    if (!data || !data.charts) return;

                    // 2. 安全渲染饼图
                    const langCtx = document.getElementById('language-distribution-chart');
                    if (langCtx) {
                        const langData = data.charts.languageDistribution || {};
                        const langLabels = Object.keys(langData);
                        
                        if (langLabels && langLabels.length > 0) {
                            new Chart(langCtx, {
                                type: 'doughnut',
                                data: {
                                    labels: langLabels,
                                    datasets: [{ data: Object.values(langData), backgroundColor: ['#3b82f6', '#eab308', '#a855f7', '#ec4899', '#22c55e', '#9ca3af'] }]
                                },
                                options: { responsive: true, maintainAspectRatio: false }
                            });
                        }
                    }

                    // 3. 安全渲染折线图 (重点修复位置)
                    const starCtx = document.getElementById('star-growth-chart');
                    if (starCtx) {
                        const starGrowth = data.charts.starGrowth || {};
                        // 强制保底，如果找不到 labels 就给个默认数组
                        const starLabels = starGrowth.labels || ['暂无数据'];
                        const starValues = starGrowth.data || [0];
                        
                        if (starLabels && starLabels.length > 0) {
                            new Chart(starCtx, {
                                type: 'line',
                                data: {
                                    labels: starLabels,
                                    datasets: [{ data: starValues, borderColor: '#ec4899', fill: true }]
                                },
                                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                            });
                        }
                    }
                };

                onMounted(async () => {
                    try {
                        const response = await fetch(`./data.json?t=${new Date().getTime()}`);
                        if (!response.ok) throw new Error('网络请求失败');
                        globalData.value = await response.json();
                        isLoading.value = false;
                        
                        setTimeout(() => { renderCharts(); }, 500);
                    } catch (error) {
                        hasError.value = true;
                        isLoading.value = false;
                    }
                });

                return {
                    globalData, isLoading, hasError, searchQuery, currentCategory, categories, filteredProjects,
                    formatStars: (s) => s > 1000 ? (s/1000).toFixed(1)+'k' : s
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
